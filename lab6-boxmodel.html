<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Model Lab</title>
<style>
.box {
  border: 5px solid blue;
}
.box {
    padding: 20px;
}
.box {
  margin: 20px;
}
.boxing-box{
  box-sizing: border-box;
}

.box{
    border: 5px solid blue;
    padding: 20px;
    margin: 20px;
}

.box{
    background-color: lightblue;
}

</style>
</head>
<body>
<h1>CSS Box Model Lab</h1>
<div class="box">
<p>This is a demonstration of the CSS Box Model.</p>
</div>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="box">
<p2>This box uses the border-box model, which includes padding and border in the total width and height.</p2>
</div>

<style>
.box {
  border: 5px solid blue;
}
.box {
    padding: 20px;
}
.box {
  margin: 20px;
}
.boxing-box{
  box-sizing: border-box;
}

.box{
    border: 5px solid blue;
    padding: 20px;
    margin: 20px;
}

.box{
    background-color: lightgray;
}
.box{
    width: 200px;  
    height: 100px;
}


</style>

</body>
</html>
